services:
  mongo:
    image: mongo:7
    container_name: novamart-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: novamart-server:latest
    container_name: novamart-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5050
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/novamart}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:5173}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-NovaMart-Support}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "5050"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    image: novamart-client:latest
    container_name: novamart-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-5173}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
    name: novamart_mongo_data
